# Hexo Configuration
title: 光谷教会 | Light Valley Church
subtitle: ''
description: 城造在山上，光照进谷中。Build a City on the Hill, Shine Your Light into the Valley.
keywords:
author: 光谷教会
language: zh-CN
timezone: ''

# URL
url: https://www.lightvalley.org
permalink: :year/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Excerpt
excerpt:
  length: 500

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 20
pagination_dir: page

# Extensions
theme: next

# Deployment
deploy:
  type: ''
