<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 - LVC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

    .header { background: #24292e; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; }
    .header a { color: white; text-decoration: none; margin-left: 20px; }
    .header a:hover { text-decoration: underline; }
    .header .save-status { font-size: 12px; color: #8b949e; margin-left: 20px; }
    .header .save-status.saving { color: #f0ad4e; }
    .header .save-status.saved { color: #2ea44f; }

    .container { display: flex; height: calc(100vh - 60px); }
    .sidebar { width: 280px; background: white; border-right: 1px solid #d1d5da; overflow-y: auto; padding: 15px; }
    .sidebar h3 { font-size: 14px; color: #586069; margin-bottom: 10px; text-transform: uppercase; }
    .new-article-btn { width: 100%; padding: 10px; background: #2ea44f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-bottom: 15px; }
    .new-article-btn:hover { background: #2c974b; }

    .editor-area { flex: 1; display: flex; flex-direction: column; background: white; overflow: hidden; }
    .editor-header { padding: 15px 20px; border-bottom: 1px solid #d1d5da; }
    .editor-header input[type="text"] { width: 100%; padding: 10px; font-size: 20px; border: 1px solid #d1d5da; border-radius: 4px; }
    .editor-header input:focus { outline: none; border-color: #0366d6; }
    .meta-row { display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
    .meta-row input[type="text"], .meta-row input[type="date"], .meta-row select { padding: 6px 10px; border: 1px solid #d1d5da; border-radius: 4px; font-size: 14px; }
    .meta-row label { font-size: 14px; color: #586069; }

    .editor-toolbar { padding: 10px 20px; background: #f6f8fa; border-bottom: 1px solid #d1d5da; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .editor-toolbar button { padding: 6px 12px; background: white; border: 1px solid #d1d5da; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .editor-toolbar button:hover { background: #f0f0f0; }
    .editor-toolbar .separator { width: 1px; height: 24px; background: #d1d5da; margin: 0 10px; }
    .image-upload-btn { padding: 6px 12px; background: white; border: 1px solid #d1d5da; border-radius: 4px; cursor: pointer; font-size: 14px; }
    input[type="file"] { display: none; }

    .editor-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 400px; }
    .editor-container { flex: 1; overflow: hidden; position: relative; }
    .CodeMirror { height: 100% !important; font-size: 15px; line-height: 1.6; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
    .editor-preview { padding: 20px; overflow-y: auto; background: #fafafa; border-top: 1px solid #d1d5da; flex: 1; min-height: 150px; max-height: 40vh; }
    .editor-preview h1 { font-size: 28px; margin-bottom: 15px; }
    .editor-preview h2 { font-size: 24px; margin: 20px 0 10px; }
    .editor-preview h3 { font-size: 20px; margin: 15px 0 8px; }
    .editor-preview p { margin: 10px 0; line-height: 1.8; }
    .editor-preview blockquote { border-left: 4px solid #d1d5da; padding-left: 15px; color: #6a737d; margin: 15px 0; }
    .editor-preview ul, .editor-preview ol { margin: 10px 0; padding-left: 25px; }
    .editor-preview code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
    .editor-preview pre { background: #f6f8fa; padding: 15px; border-radius: 4px; overflow-x: auto; margin: 15px 0; }
    .editor-preview img { max-width: 100%; height: auto; }

    .action-bar { padding: 15px 20px; border-top: 1px solid #d1d5da; display: flex; gap: 10px; justify-content: flex-end; background: #f6f8fa; }
    .action-bar button { padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; border: none; }
    .btn-save { background: #0366d6; color: white; }
    .btn-save:hover { background: #0256b3; }
    .btn-publish { background: #2ea44f; color: white; }
    .btn-publish:hover { background: #2c974b; }
    .btn-cancel { background: #f6f8fa; border: 1px solid #d1d5da !important; color: #24292e; }

    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; width: 450px; max-width: 90%; }
    .modal-content h2 { margin-bottom: 20px; font-size: 20px; }
    .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
    .modal-content p { font-size: 12px; color: #666; margin-bottom: 15px; line-height: 1.5; }
    .modal-content button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
    .modal-content .btn-primary { background: #4183c4; color: white; }

    .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #24292e; color: white; border-radius: 4px; font-size: 14px; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #2ea44f; }
    .toast.error { background: #cb2431; }

    .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); z-index: 999; display: flex; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top-color: #4183c4; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { background: #fff8e5; border: 1px solid #ffe58f; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; color: #8a6d3b; }
  </style>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplemde/1.11.2/simplemde.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplemde/1.11.2/simplemde.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>LVC 文章管理</h1>
    <div style="display:flex;align-items:center;">
      <span class="save-status" id="saveStatus"></span>
      <label class="image-upload-btn">
        上传图片<input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
      </label>
      <a href="list.html">文章列表</a>
      <a href="index.html">写文章</a>
      <a onclick="showSettings()">设置</a>
    </div>
  </div>

  <div class="container">
    <div class="editor-area">
      <div class="editor-header">
        <input type="text" id="articleTitle" placeholder="文章标题">
        <div class="meta-row">
          <label>作者:</label>
          <input type="text" id="authorInput" value="Jeremy" style="width:100px;">
          <label>日期:</label>
          <input type="date" id="articleDate" style="width:150px;">
          <label>分类:</label>
          <select id="categorySelect">
            <option value="">选择分类</option>
            <option value="未分类">未分类</option>
            <option value="诗篇">诗篇</option>
            <option value="马可福音">马可福音</option>
            <option value="约翰福音">约翰福音</option>
            <option value="路加福音">路加福音</option>
            <option value="马太福音">马太福音</option>
            <option value="创世记">创世记</option>
            <option value="罗马书">罗马书</option>
            <option value="加拉太书">加拉太书</option>
            <option value="以弗所书">以弗所书</option>
            <option value="腓立比书">腓立比书</option>
            <option value="歌罗西书">歌罗西书</option>
            <option value="希伯来书">希伯来书</option>
            <option value="雅各书">雅各书</option>
            <option value="约翰一书">约翰一书</option>
            <option value="启示录">启示录</option>
            <option value="使徒行传">使徒行传</option>
            <option value="见证">见证</option>
            <option value="圣诞节">圣诞节</option>
            <option value="复活节">复活节</option>
          </select>
          <label>标签:</label>
          <input type="text" id="articleTags" placeholder="多个标签用逗号分隔" style="width:180px;">
        </div>
      </div>

      <div class="editor-toolbar">
        <button onclick="insertMd('**', '**')"><b>B</b></button>
        <button onclick="insertMd('*', '*')"><i>I</i></button>
        <button onclick="insertMd('<u>', '</u>')"><u>U</u></button>
        <div class="separator"></div>
        <button onclick="insertMdAtLine('# ')">H1</button>
        <button onclick="insertMdAtLine('## ')">H2</button>
        <button onclick="insertMdAtLine('### ')">H3</button>
        <div class="separator"></div>
        <button onclick="insertMd('> ', '')">引用</button>
        <button onclick="insertMdAtLine('- ')">列表</button>
        <button onclick="insertMdAtLine('1. ')">数字列表</button>
        <div class="separator"></div>
        <button onclick="insertMd('`', '`')">代码</button>
        <button onclick="insertMd('```\n', '\n```')">代码块</button>
      </div>

      <div class="editor-wrapper">
        <div class="editor-container">
          <textarea id="editor"></textarea>
        </div>
        <div class="editor-preview" id="preview"></div>
      </div>

      <div class="action-bar">
        <button class="btn-cancel" onclick="clearEditor()">清空</button>
        <button class="btn-save" onclick="saveDraftLocal()">保存草稿</button>
        <button class="btn-publish" onclick="publishArticle()">发布</button>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <h2>设置</h2>
      <div class="hint">
        <b>重要：</b>需要一个 GitHub Personal Access Token 来操作仓库。<br>
        生成方法：<br>
        1. 登录 GitHub → 点击头像 → Settings<br>
        2. 左侧底部 "Developer settings"<br>
        3. Personal access tokens → Generate new token<br>
        4. 勾选 <b>repo</b> 权限
      </div>
      <input type="text" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <button class="btn-primary" onclick="saveSettings()">保存</button>
      <button onclick="closeSettings()" style="background:#f6f8fa;border:1px solid #d1d5da;">取消</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let simplemde = null;
    let currentArticle = null;
    let githubToken = '';
    let autoSaveTimer = null;
    let hasUnsavedChanges = false;
    const OWNER = 'CNLVC';
    const REPO = 'lvc';
    const BRANCH = 'master';

    document.addEventListener('DOMContentLoaded', () => {
      githubToken = localStorage.getItem('lvc_github_token') || '';
      if (githubToken) {
        document.getElementById('githubToken').value = githubToken;
      }
      document.getElementById('articleDate').value = new Date().toISOString().split('T')[0];
      initEditor();

      // 检查 URL 参数中是否有文章路径
      const params = new URLSearchParams(window.location.search);
      const path = params.get('path');
      if (path) {
        loadArticle(path);
      }
    });

    function initEditor() {
      if (simplemde) return;

      simplemde = new SimpleMDE({
        element: document.getElementById('editor'),
        spellChecker: false,
        autofocus: true,
        placeholder: '在这里写文章内容...',
        renderingConfig: { codeSyntaxHighlighting: false }
      });

      simplemde.codemirror.on('change', () => {
        hasUnsavedChanges = true;
        updatePreview();
        scheduleAutoSave();
      });

      ['articleTitle', 'authorInput', 'articleTags', 'categorySelect'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
          hasUnsavedChanges = true;
          scheduleAutoSave();
        });
      });

      updatePreview();
    }

    function updatePreview() {
      const content = simplemde ? simplemde.value() : '';
      const html = simplemde.markdown(content);
      document.getElementById('preview').innerHTML = html || '<p style="color:#999">预览区域</p>';
    }

    function scheduleAutoSave() {
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      updateSaveStatus('有未保存的更改', 'saving');
      autoSaveTimer = setTimeout(() => autoSaveToLocal(), 2000);
    }

    function autoSaveToLocal() {
      const title = document.getElementById('articleTitle').value;
      const content = simplemde ? simplemde.value() : '';
      if (!title && !content) return;

      localStorage.setItem('lvc_current_draft', JSON.stringify({
        id: currentArticle ? currentArticle.path : ('draft-' + Date.now()),
        title, content,
        date: document.getElementById('articleDate').value,
        author: document.getElementById('authorInput').value,
        category: document.getElementById('categorySelect').value,
        tags: document.getElementById('articleTags').value,
        savedAt: new Date().toISOString()
      }));

      hasUnsavedChanges = false;
      updateSaveStatus('已自动保存 ' + new Date().toLocaleTimeString(), 'saved');
    }

    function updateSaveStatus(text, status) {
      const el = document.getElementById('saveStatus');
      el.textContent = text;
      el.className = 'save-status ' + status;
    }

    function insertMd(before, after) {
      if (!simplemde) return;
      const cm = simplemde.codemirror;
      const start = cm.getSelection();
      cm.replaceSelection(before + start + after);
      cm.focus();
    }

    function insertMdAtLine(prefix) {
      if (!simplemde) return;
      const cm = simplemde.codemirror;
      const pos = cm.getCursor();
      const line = cm.getLine(pos.line);
      cm.replaceRange(prefix + line, { line: pos.line, ch: 0 }, { line: pos.line, ch: line.length });
      cm.focus();
    }

    function showSettings() { document.getElementById('settingsModal').classList.add('active'); }
    function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }

    function saveSettings() {
      const token = document.getElementById('githubToken').value.trim();
      if (token) {
        localStorage.setItem('lvc_github_token', token);
        githubToken = token;
        showToast('设置已保存', 'success');
        closeSettings();
      }
    }

    async function githubRequest(method, path, data = null) {
      if (!githubToken) {
        showToast('请先配置 GitHub Token', 'error');
        showSettings();
        throw new Error('No token');
      }

      const url = `https://api.github.com${path}`;
      const options = {
        method,
        headers: {
          'Authorization': `token ${githubToken}`,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        }
      };
      if (data) options.body = JSON.stringify(data);

      const response = await fetch(url, options);
      if (!response.ok) {
        const error = await response.json().catch(() => ({ message: response.statusText }));
        throw new Error(error.message || '请求失败');
      }
      return response.json();
    }

    async function loadArticle(dirPath) {
      try {
        const path = `${dirPath}/index.html`;
        const data = await githubRequest('GET', `/repos/${OWNER}/${REPO}/contents/${path}`);
        const response = await fetch(data.download_url);
        const content = await response.text();

        const contentMatch = content.match(/<div class="entry-content"[^>]*>([\s\S]*?)<div class="post-shares">/);
        let articleContent = contentMatch ? contentMatch[1] : '';
        articleContent = htmlToMarkdown(articleContent);

        currentArticle = { path, dirPath, sha: data.sha, content: articleContent };

        const [year, month, day, ...titleParts] = dirPath.split('/');
        document.getElementById('articleTitle').value = titleParts.join('/');
        document.getElementById('articleDate').value = `${year}-${month}-${day}`;
        if (simplemde) simplemde.value(articleContent);

        const authorMatch = content.match(/rel="author"[^>]*>([^<]+)<\/a>/);
        if (authorMatch) document.getElementById('authorInput').value = authorMatch[1];

        const tagsMatch = content.match(/rel="tag"[^>]*>([^<]+)<\/a>/g);
        if (tagsMatch) document.getElementById('articleTags').value = tagsMatch.map(t => t.match(/>([^<]+)</)[1]).join(', ');

        const categoryMatch = content.match(/href="\/categories\/([^"]+)"/);
        if (categoryMatch) document.getElementById('categorySelect').value = decodeURIComponent(categoryMatch[1]);

        updatePreview();
        hasUnsavedChanges = false;
        updateSaveStatus('', '');

      } catch (error) {
        showToast('加载文章失败: ' + error.message, 'error');
      }
    }

    function htmlToMarkdown(html) {
      if (!html) return '';
      return html
        .replace(/<h1[^>]*>([^<]+)<\/h1>/gi, '# $1\n')
        .replace(/<h2[^>]*>([^<]+)<\/h2>/gi, '## $1\n')
        .replace(/<h3[^>]*>([^<]+)<\/h3>/gi, '### $1\n')
        .replace(/<strong>([^<]+)<\/strong>/gi, '**$1**')
        .replace(/<b>([^<]+)<\/b>/gi, '**$1**')
        .replace(/<em>([^<]+)<\/em>/gi, '*$1*')
        .replace(/<i>([^<]+)<\/i>/gi, '*$1*')
        .replace(/<u>([^<]+)<\/u>/gi, '<u>$1</u>')
        .replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, '> $1\n')
        .replace(/<li[^>]*>([\s\S]*?)<\/li>/gi, '- $1\n')
        .replace(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]+)"[^>]*>/gi, '![$2]($1)')
        .replace(/<img[^>]*alt="([^"]+)"[^>]*src="([^"]+)"[^>]*>/gi, '![$1]($2)')
        .replace(/<img[^>]*src="([^"]+)"[^>]*>/gi, '![]($1)')
        .replace(/<a[^>]*href="([^"]+)"[^>]*>([^<]+)<\/a>/gi, '[$2]($1)')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<p[^>]*>([\s\S]*?)<\/p>/gi, '$1\n\n')
        .replace(/<[^>]+>/g, '')
        .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'")
        .replace(/\n{3,}/g, '\n\n').trim();
    }

    function clearEditor() {
      if (confirm('确定要清空编辑器吗？')) {
        currentArticle = null;
        document.getElementById('articleTitle').value = '';
        document.getElementById('articleDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('authorInput').value = 'Jeremy';
        document.getElementById('articleTags').value = '';
        document.getElementById('categorySelect').value = '';
        if (simplemde) simplemde.value('');
        updatePreview();
        hasUnsavedChanges = false;
        updateSaveStatus('', '');
        history.replaceState({}, '', window.location.pathname);
      }
    }

    function saveDraftLocal() {
      autoSaveToLocal();
      showToast('草稿已保存', 'success');
    }

    async function publishArticle() {
      const title = document.getElementById('articleTitle').value.trim();
      const date = document.getElementById('articleDate').value;
      const author = document.getElementById('authorInput').value.trim();
      const category = document.getElementById('categorySelect').value;
      const tags = document.getElementById('articleTags').value.split(',').map(t => t.trim()).filter(t => t);
      const content = simplemde ? simplemde.value() : '';

      if (!title) { showToast('请填写文章标题', 'error'); return; }
      if (!date) { showToast('请选择日期', 'error'); return; }
      if (!content) { showToast('请填写文章内容', 'error'); return; }
      if (!author) { showToast('请填写作者', 'error'); return; }

      try {
        const dateParts = date.split('-');
        const dirPath = `${dateParts[0]}/${dateParts[1]}/${dateParts[2]}/${title}`;
        const path = `${dirPath}/index.html`;
        const html = generateHTML(title, date, author, category, tags, content);

        let sha = null;
        if (currentArticle) {
          sha = currentArticle.sha;
        } else {
          try {
            const existing = await githubRequest('GET', `/repos/${OWNER}/${REPO}/contents/${path}`);
            sha = existing.sha;
          } catch (e) {}
        }

        await githubRequest('PUT', `/repos/${OWNER}/${REPO}/contents/${path}`, {
          message: `发布文章: ${title}`,
          content: btoa(unescape(encodeURIComponent(html))),
          sha: sha,
          branch: BRANCH
        });

        showToast('发布成功！', 'success');
        hasUnsavedChanges = false;
        localStorage.removeItem('lvc_current_draft');

        setTimeout(() => {
          window.location.href = 'list.html';
        }, 1500);

      } catch (error) {
        showToast('发布失败: ' + error.message, 'error');
      }
    }

    function generateHTML(title, date, author, category, tags, content) {
      const tagsHTML = tags.map(tag => `<a href="/tags/${encodeURIComponent(tag)}/" rel="tag">${tag}</a>`).join('\n      ');
      const categoryLink = category ? `<a href="/categories/${encodeURIComponent(category)}/" rel="category tag">${category}</a>` : '';
      const articleHTML = simplemde.markdown(content);

      return `<!doctype html>
<html class="theme-next mist use-motion" lang="zh-Hans">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <link rel="alternate" href="/atom.xml" title="光谷教会 | Light Valley Church" type="application/atom+xml" />
  <link rel="canonical" href="http://www.lightvalley.org/"/>
  <title>${title} | 光谷教会</title>
</head>
<body itemscope itemtype="http://schema.org/Article">
  <header class="header"> </header>
  <div class="main">
    <article class="article" itemscope itemtype="https://schema.org/Article">
      <h1 class="title" itemprop="name">${title}</h1>
      <div class="post-meta">
        <span class="post-date" itemprop="dateCreated">${date}</span>
        <a href="/authors/${encodeURIComponent(author)}/" rel="author" itemprop="author">${author}</a>${categoryLink ? ' · ' + categoryLink : ''}
      </div>
      <div class="post-tags">${tags.length > 0 ? tagsHTML : ''}</div>
      <div class="entry-content" itemprop="articleBody">${articleHTML}</div>
      <div class="post-shares"> </div>
    </article>
    <nav class="article-nav"><a href="/" class="prev">返回首页</a></nav>
  </div>
  <footer class="footer"> </footer>
</body>
</html>`;
    }

    async function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (!githubToken) { showToast('请先配置 GitHub Token', 'error'); showSettings(); return; }

      try {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result.split(',')[1];
          const ext = file.name.split('.').pop() || 'png';
          const fileName = `images/${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${ext}`;

          await githubRequest('PUT', `/repos/${OWNER}/${REPO}/contents/${fileName}`, {
            message: `上传图片: ${file.name}`,
            content: base64,
            branch: BRANCH
          });

          const imageUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${fileName}`;
          if (simplemde) {
            simplemde.codemirror.replaceSelection(`\n![${file.name}](${imageUrl})\n`);
          }
          showToast('图片上传成功！', 'success');
        };
        reader.readAsDataURL(file);
      } catch (error) {
        showToast('图片上传失败: ' + error.message, 'error');
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
