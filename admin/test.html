<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>编码测试</title>
</head>
<body>
  <h1>Base64 编码测试</h1>
  <div id="output"></div>
  <script>
    // 测试 Base64 编解码
    const testStr = '幸福感的翻转 - 测试中文内容';

    function encodeBase64(content) {
      return btoa(unescape(encodeURIComponent(content)));
    }

    function decodeBase64(base64String) {
      try {
        const binaryString = atob(base64String);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        return new TextDecoder('utf-8').decode(bytes);
      } catch (e) {
        console.error('解码失败:', e);
        return '解码失败: ' + e.message;
      }
    }

    // 测试编码
    const encoded = encodeBase64(testStr);
    document.getElementById('output').innerHTML += '<p>原文: ' + testStr + '</p>';
    document.getElementById('output').innerHTML += '<p>Base64: ' + encoded + '</p>';

    // 测试解码
    const decoded = decodeBase64(encoded);
    document.getElementById('output').innerHTML += '<p>解码后: ' + decoded + '</p>';
    document.getElementById('output').innerHTML += '<p>一致性: ' + (testStr === decoded ? '是' : '否') + '</p>';

    // 测试 GitHub API 返回的格式 (带换行的 base64)
    const githubStyle = btoa(unescape(encodeURIComponent(testStr)));
    const withNewlines = githubStyle.match(/.{1,76}/g).join('\n');
    document.getElementById('output').innerHTML += '<p>带换行的 Base64: ' + withNewlines + '</p>';
    document.getElementById('output').innerHTML += '<p>解码带换行: ' + decodeBase64(withNewlines) + '</p>';
  </script>
</body>
</html>
