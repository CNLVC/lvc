name: 更新后台密码

on:
  push:
    paths:
      - '.admin_password'

jobs:
  update-password:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read new password
        id: password
        run: |
          # Base64 解码
          DECODED=$(cat .admin_password | base64 -d)
          echo "new_password=$DECODED" >> $GITHUB_OUTPUT
          echo "New password length: ${#DECODED}"

      - name: Update ADMIN_PASSWORD secret
        env:
          NEW_PASS: ${{ steps.password.outputs.new_password }}
        run: |
          echo "$NEW_PASS" | gh secret set ADMIN_PASSWORD

      - name: Trigger main build
        run: |
          sleep 2
          gh workflow run pages.yml

      - name: Clear password file
        run: |
          echo "" | base64 > .admin_password
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .admin_password
          git commit -m "chore: clear admin password file"
          git push
