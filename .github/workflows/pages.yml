name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup theme
        run: |
          rm -rf themes
          mkdir -p themes
          cp -r node_modules/hexo-theme-next themes/next

      - name: Configure theme with pre-configured settings
        run: |
          cp theme_config/next_config.yml themes/next/_config.yml

      - name: Patch theme templates
        run: |
          cp theme_templates/_layout.njk themes/next/layout/_layout.njk
          cp theme_templates/_macro/sidebar.njk themes/next/layout/_macro/sidebar.njk
          cp theme_templates/_macro/post.njk themes/next/layout/_macro/post.njk
          cp theme_templates/categories.njk themes/next/layout/categories.njk

      - name: Inject admin password
        run: |
          echo "Using password from variable"
          node -e "
            const fs = require('fs');
            const password = '${{ vars.ADMIN_PASSWORD }}' || 'Lvc*8002';
            console.log('Password:', password.substring(0,2)+'***');
            let content = fs.readFileSync('admin/index.html', 'utf8');
            content = content.replace(/INJECTED_PASSWORD/, password);
            fs.writeFileSync('admin/index.html', content);
            console.log('Password injected');
          "

      - name: Build Hexo site
        run: npm run build

      - name: Remove draft posts
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            function hasDraftFrontMatter(filePath) {
              try {
                const content = fs.readFileSync(filePath, 'utf8');
                const match = content.match(/^---\n([\s\S]*?)\n---/);
                if (match) {
                  const fm = match[1];
                  return fm.includes('draft: true');
                }
              } catch (e) {}
              return false;
            }

            const postsDir = 'source/_posts';
            if (fs.existsSync(postsDir)) {
              const files = fs.readdirSync(postsDir);
              for (const file of files) {
                if (file.endsWith('.md')) {
                  const fullPath = path.join(postsDir, file);
                  if (hasDraftFrontMatter(fullPath)) {
                    console.log('Draft found:', file);
                    const match = file.match(/^(\d{4}-\d{2}-\d{2})-(.+)\.md$/);
                    if (match) {
                      const date = match[1];
                      const slug = match[2];
                      const year = date.split('-')[0];
                      const publicPath = path.join('public', year, date + '-' + slug);
                      if (fs.existsSync(publicPath)) {
                        console.log('Removing:', publicPath);
                        fs.rmSync(publicPath, { recursive: true });
                      }
                    }
                  }
                }
              }
            }
            console.log('Draft removal done');
          "

      - name: Copy static files and admin panel to public
        run: |
          cp CNAME public/ || true
          cp -r admin public/
          # about and new pages are now generated by Hexo from source/about and source/new
          # cp -r about public/  # Removed - Hexo generates from source/about/index.md
          # cp -r new public/    # Removed - Hexo generates from source/new/index.md
          # cp -r archives public/  # Removed - hexo generates archives with correct article URLs
          # categories, tags, archives pages are generated by Hexo - do NOT copy static files over them
          cp -r authors public/
          cp -r images public/
          cp -r lib public/
          cp -r js public/
          # Copy v5 CSS to v5.css, keep NexT CSS as main.css for homepage
          cp css/main.css public/css/v5.css
          # Copy XML files for search and RSS
          cp search.xml atom.xml public/
          cp source/js/truncate.js public/js/ 2>/dev/null || true
          cp source/js/transform-menu.js public/js/ 2>/dev/null || true
          cp source/js/darkmode.js public/js/ 2>/dev/null || true

      - name: Inject darkmode script into HTML
        run: |
          find public -name "*.html" -exec sed -i 's|</body>|<script src="/js/darkmode.js"><\/script><\/body>|g' {} \;

      - name: Fix copyright year from 2019 to 2008
        run: |
          find public -name "*.html" -exec sed -i 's/<span itemprop="copyrightYear">2019<\/span>/<span itemprop="copyrightYear">2008<\/span>/g' {} \;

      - name: Remove archive count text prefix and suffix
        run: |
          find public -name "*.html" -exec sed -i 's/太棒了! 目前共计/目前共计/g' {} \;
          find public -name "*.html" -exec sed -i 's/篇日志。 继续努力。/篇日志。/g' {} \;

      - name: Replace categories page with custom Bible canon order
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const categoriesPath = path.join('public', 'categories', 'index.html');
          if (!fs.existsSync(categoriesPath)) {
            console.log('Categories page not found, skipping');
            process.exit(0);
          }

          let html = fs.readFileSync(categoriesPath, 'utf8');

          // Extract existing category links and counts from generated HTML
          const categoryMap = {};
          const regex = /<a class=\"category-list-link\" href=\"([^\"]+)\">([^<]+)<\\/a><span class=\"category-list-count\">(\\d+)<\\/span>/g;
          let match;
          while ((match = regex.exec(html)) !== null) {
            categoryMap[match[2]] = { url: match[1], count: parseInt(match[3]) };
          }
          console.log('Found categories:', Object.keys(categoryMap).length);

          // Build category list item HTML
          function buildCategoryItem(name, categoryMap) {
            if (categoryMap[name]) {
              return '<li class=\"category-list-item\"><a class=\"category-list-link\" href=\"' + categoryMap[name].url + '\">' + name + '</a><span class=\"category-list-count\">' + categoryMap[name].count + '</span></li>';
            } else {
              return '<li class=\"category-list-item\"><a class=\"category-list-link\" href=\"#\">' + name + '</a></li>';
            }
          }

          const customContent = '<div class=\"posts-expand\"><div class=\"post-block\"><div class=\"post-body\">' +
            '<p><strong>旧约</strong></p><ul>' +
            buildCategoryItem('创世记', categoryMap) +
            buildCategoryItem('出埃及记', categoryMap) +
            buildCategoryItem('利未记', categoryMap) +
            buildCategoryItem('民数记', categoryMap) +
            buildCategoryItem('申命记', categoryMap) +
            buildCategoryItem('约书亚记', categoryMap) +
            buildCategoryItem('士师记', categoryMap) +
            buildCategoryItem('路得记', categoryMap) +
            buildCategoryItem('撒母耳记上', categoryMap) +
            buildCategoryItem('撒母耳记下', categoryMap) +
            buildCategoryItem('列王纪上', categoryMap) +
            buildCategoryItem('列王纪下', categoryMap) +
            buildCategoryItem('历代志上', categoryMap) +
            buildCategoryItem('历代志下', categoryMap) +
            buildCategoryItem('以斯拉记', categoryMap) +
            buildCategoryItem('尼希米记', categoryMap) +
            buildCategoryItem('以斯帖记', categoryMap) +
            buildCategoryItem('约伯记', categoryMap) +
            buildCategoryItem('诗篇', categoryMap) +
            buildCategoryItem('箴言', categoryMap) +
            buildCategoryItem('传道书', categoryMap) +
            buildCategoryItem('雅歌', categoryMap) +
            buildCategoryItem('以赛亚书', categoryMap) +
            buildCategoryItem('耶利米书', categoryMap) +
            buildCategoryItem('耶利米哀歌', categoryMap) +
            buildCategoryItem('以西结书', categoryMap) +
            buildCategoryItem('但以理书', categoryMap) +
            buildCategoryItem('何西阿书', categoryMap) +
            buildCategoryItem('约珥书', categoryMap) +
            buildCategoryItem('阿摩司书', categoryMap) +
            buildCategoryItem('俄巴底亚书', categoryMap) +
            buildCategoryItem('约拿书', categoryMap) +
            buildCategoryItem('弥迦书', categoryMap) +
            buildCategoryItem('那鸿书', categoryMap) +
            buildCategoryItem('哈巴谷书', categoryMap) +
            buildCategoryItem('西番雅书', categoryMap) +
            buildCategoryItem('哈该书', categoryMap) +
            buildCategoryItem('撒迦利亚书', categoryMap) +
            buildCategoryItem('玛拉基书', categoryMap) +
            buildCategoryItem('二先知系列', categoryMap) +
            '</ul><p><strong>新约</strong></p><ul>' +
            buildCategoryItem('马太福音', categoryMap) +
            buildCategoryItem('马可福音', categoryMap) +
            buildCategoryItem('路加福音', categoryMap) +
            buildCategoryItem('约翰福音', categoryMap) +
            buildCategoryItem('使徒行传', categoryMap) +
            buildCategoryItem('罗马书', categoryMap) +
            buildCategoryItem('哥林多前书', categoryMap) +
            buildCategoryItem('哥林多后书', categoryMap) +
            buildCategoryItem('加拉太书', categoryMap) +
            buildCategoryItem('以弗所书', categoryMap) +
            buildCategoryItem('腓立比书', categoryMap) +
            buildCategoryItem('歌罗西书', categoryMap) +
            buildCategoryItem('帖撒罗尼迦前书', categoryMap) +
            buildCategoryItem('帖撒罗尼迦后书', categoryMap) +
            buildCategoryItem('提摩太前书', categoryMap) +
            buildCategoryItem('提摩太后书', categoryMap) +
            buildCategoryItem('提多书', categoryMap) +
            buildCategoryItem('腓利门书', categoryMap) +
            buildCategoryItem('希伯来书', categoryMap) +
            buildCategoryItem('雅各书', categoryMap) +
            buildCategoryItem('彼得前书', categoryMap) +
            buildCategoryItem('彼得后书', categoryMap) +
            buildCategoryItem('约翰一书', categoryMap) +
            buildCategoryItem('约翰二书', categoryMap) +
            buildCategoryItem('约翰三书', categoryMap) +
            buildCategoryItem('犹大书', categoryMap) +
            buildCategoryItem('启示录', categoryMap) +
            '</ul><p><strong>其他</strong></p><ul>' +
            buildCategoryItem('主祷文', categoryMap) +
            buildCategoryItem('复活节', categoryMap) +
            buildCategoryItem('圣诞节', categoryMap) +
            buildCategoryItem('情人节', categoryMap) +
            buildCategoryItem('圣洁系列', categoryMap) +
            buildCategoryItem('见证', categoryMap) +
            buildCategoryItem('未分类', categoryMap) +
            '</ul></div></div></div>';

          const categoryAllMatch = html.match(/<div class=\"category-all-page\">[\\s\\S]*?<\\/div>\\s*<\\/div>\\s*<\\/div>/);
          if (categoryAllMatch) {
            html = html.replace(categoryAllMatch[0], customContent);
            fs.writeFileSync(categoriesPath, html);
            console.log('Categories page replaced successfully');
          } else {
            console.log('Could not find category-all div to replace');
          }

          const hideCSS = '<style>.post-header,.category-all-title{display:none!important}</style>';
          html = html.replace('</head>', hideCSS + '</head>');
          fs.writeFileSync(categoriesPath, html);
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
