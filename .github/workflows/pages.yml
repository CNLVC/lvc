name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup theme
        run: |
          rm -rf themes
          mkdir -p themes
          cp -r node_modules/hexo-theme-next themes/next

      - name: Configure theme with pre-configured settings
        run: |
          cp theme_config/next_config.yml themes/next/_config.yml

      - name: Build Hexo site
        run: npm run build

      - name: Copy static files and admin panel to public
        run: |
          cp CNAME public/ || true
          cp -r admin public/
          cp -r about public/
          cp -r new public/
          cp -r archives public/
          cp -r tags public/
          cp -r categories public/
          cp -r authors public/
          cp -r images public/
          cp -r lib public/
          cp -r js public/
          cp -r css public/
          cp source/js/truncate.js public/js/ 2>/dev/null || true

      - name: Replace homepage header and sidebar with v5 style
        run: node scripts/replace-header.js
          # Fix static HTML pages - update sidebar position to right
          for f in public/about/index.html public/new/index.html public/archives/index.html; do
            if [ -f "$f" ]; then
              sed -i 's/"position":"left"/"position":"right"/g' "$f"
              sed -i 's/sidebar-position-left/sidebar-position-right/g' "$f"
              sed -i 's/darkmode": true/darkmode": false/g' "$f"
              # Fix relative paths to absolute paths
              sed -i 's|href="\.\./css/|href="/css/|g' "$f"
              sed -i 's|href="\.\./lib/|href="/lib/|g' "$f"
              sed -i 's|href="\.\./js/|href="/js/|g' "$f"
              sed -i 's|src="\.\./js/|src="/js/|g' "$f"
              sed -i 's|src="\.\./lib/|src="/lib/|g' "$f"
              # Add truncate.js script
              sed -i 's|</body>|<script src="/js/truncate.js"></script></body>|' "$f"
            fi
          done
          # Also fix all HTML files in subdirectories
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's/"position":"left"/"position":"right"/g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's/sidebar-position-left/sidebar-position-right/g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's/darkmode": true/darkmode": false/g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's|</body>|<script src="/js/truncate.js"></script></body>|' {} \;
          # Fix relative paths in all subdirectory HTML files
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's|href="\.\./css/|href="/css/|g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's|href="\.\./lib/|href="/lib/|g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's|href="\.\./js/|href="/js/|g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's|src="\.\./js/|src="/js/|g' {} \;
          find public/about public/new public/archives public/tags public/categories -name "index.html" -exec sed -i 's|src="\.\./lib/|src="/lib/|g' {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
