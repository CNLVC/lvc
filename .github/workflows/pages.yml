name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup theme
        run: |
          rm -rf themes
          mkdir -p themes
          cp -r node_modules/hexo-theme-next themes/next

      - name: Configure theme with pre-configured settings
        run: |
          cp theme_config/next_config.yml themes/next/_config.yml

      - name: Patch theme templates
        run: |
          cp theme_templates/_layout.njk themes/next/layout/_layout.njk
          cp theme_templates/_macro/sidebar.njk themes/next/layout/_macro/sidebar.njk
          cp theme_templates/_macro/post.njk themes/next/layout/_macro/post.njk

      - name: Inject admin password
        run: |
          node -e "
            const fs = require('fs');
            const password = '${{ vars.ADMIN_PASSWORD }}' || 'Lvc*8002';
            console.log('Password:', password.substring(0, 3) + '***');
            let content = fs.readFileSync('admin/index.html', 'utf8');
            content = content.replace(/INJECTED_PASSWORD/, password);
            fs.writeFileSync('admin/index.html', content);
            console.log('Done');
          "

      - name: Build Hexo site
        run: npm run build
          
      - name: Copy static files and admin panel to public
        run: |
          cp CNAME public/ || true
          cp -r admin public/
          cp -r about public/
          cp -r new public/
          cp -r archives public/
          cp -r tags public/
          cp -r categories public/
          cp -r authors public/
          cp -r images public/
          cp -r lib public/
          cp -r js public/
          # Copy v5 CSS to v5.css, keep NexT CSS as main.css for homepage
          cp css/main.css public/css/v5.css
          # Copy XML files for search and RSS
          cp search.xml atom.xml public/
          cp source/js/truncate.js public/js/ 2>/dev/null || true
          cp source/js/transform-menu.js public/js/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
