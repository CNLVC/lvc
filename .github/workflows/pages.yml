name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup theme
        run: |
          rm -rf themes
          mkdir -p themes
          cp -r node_modules/hexo-theme-next themes/next

      - name: Configure theme language and menu
        run: |
          sed -i 's/^scheme: Muse$/scheme: Muse\nlanguage: zh-CN/' themes/next/_config.yml
          sed -i 's/^  #home: \/ || fa fa-home$/  home: \/ || fa fa-home/' themes/next/_config.yml
          sed -i 's/^  #about: \/about\/ || fa fa-user$/  about: \/about\/ || fa fa-user/' themes/next/_config.yml
          sed -i 's/^  #tags: \/tags\/ || fa fa-tags$/  tags: \/tags\/ || fa fa-tags/' themes/next/_config.yml
          sed -i 's/^  #categories: \/categories\/ || fa fa-th$/  categories: \/categories\/ || fa fa-th/' themes/next/_config.yml
          sed -i 's/^  #archives: \/archives\/ || fa fa-archive$/  archives: \/archives\/ || fa fa-archive/' themes/next/_config.yml

      - name: Build Hexo site
        run: npm run build

      - name: Copy static files and admin panel to public
        run: |
          cp CNAME public/ || true
          cp -r admin public/
          cp -r about public/
          cp -r archives public/
          cp -r tags public/
          cp -r categories public/
          cp -r authors public/
          cp -r images public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
